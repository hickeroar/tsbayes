name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production dependency audit (blocking)
        run: npm audit --omit=dev --audit-level=high

      - name: Run full dependency audit (non-blocking visibility)
        run: npm audit --audit-level=high --json > npm-audit-full.json
        continue-on-error: true

      - name: Upload full audit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: npm-audit-full-report
          path: npm-audit-full.json
          retention-days: 30
